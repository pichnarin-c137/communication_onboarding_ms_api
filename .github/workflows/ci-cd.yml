name: CI/CD Pipeline

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  # Job 1: Run PHPUnit Tests (PostgreSQL)
  test:
    name: Tests (PHPUnit)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: coms_test
          POSTGRES_USER: coms_user
          POSTGRES_PASSWORD: coms_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_pgsql, mbstring, xml, dom, curl, zip, bcmath, intl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy environment file
        run: cp .env.example .env

      - name: Override env for testing
        run: |
          echo "APP_ENV=testing" >> .env
          echo "APP_DEBUG=true" >> .env
          echo "DB_CONNECTION=pgsql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_DATABASE=coms_test" >> .env
          echo "DB_USERNAME=coms_user" >> .env
          echo "DB_PASSWORD=coms_password" >> .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Generate RSA JWT keys
        run: |
          mkdir -p storage/keys
          openssl genrsa -out storage/keys/jwt_private.pem 2048
          openssl rsa -in storage/keys/jwt_private.pem -pubout -out storage/keys/jwt_public.pem

      - name: Set storage permissions
        run: chmod -R 775 storage bootstrap/cache

      - name: Run database migrations
        run: php artisan migrate --env=testing --force

      - name: Run tests
        run: php artisan test --env=testing

  # Job 2: Laravel Pint Code Style Check
  lint:
    name: Code Style (Pint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run Laravel Pint (dry-run)
        run: ./vendor/bin/pint --test

  # Job 3: Deploy (development branch only)
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/development' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Replace the step(s) below with your actual
      # deployment process, for example:
      #   - SSH deploy to a VPS
      #   - Push to Railway / Render / Fly.io
      #   - Trigger Laravel Forge webhook
      - name: Deploy (placeholder)
        run: |
          echo "All checks passed. Ready to deploy!"
          echo "Add your deployment steps here."
