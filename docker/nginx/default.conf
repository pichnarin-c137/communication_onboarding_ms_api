server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    # Use Docker's internal DNS so upstream IPs are re-resolved after container restarts
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Max upload size (Cloudinary uploads pass through here)
    client_max_body_size 50M;

    # Laravel routing — send everything through index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM passthrough
    location ~ \.php$ {
        set $upstream app:9000;
        fastcgi_pass $upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Telegram webhook — no buffering, pass immediately
    location = /api/v1/telegram/webhook {
        set $upstream app:9000;
        fastcgi_pass $upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        include fastcgi_params;
        fastcgi_read_timeout 60;
    }

    # Reverb WebSocket — browsers connect via wss://api.ecoapsara.com/app/...
    location /app/ {
        set $reverb reverb:8080;
        proxy_pass http://$reverb;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;
    }

    # Block .htaccess access
    location ~ /\.ht {
        deny all;
    }

    # Gzip for API responses
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 1024;
}
